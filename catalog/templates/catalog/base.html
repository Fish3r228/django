<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой сайт{% endblock %}</title>
</head>
<body>
    <nav>
        <a href="{% url 'blog:blog_list' %}">Блог</a> |
        <a href="{% url 'catalog:product_list' %}">Каталог</a> |

        {% if user.is_authenticated %}
            Привет, {{ user.email }} | <a href="{% url 'users:logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'users:login' %}">Войти</a> | <a href="{% url 'users:register' %}">Регистрация</a>
        {% endif %}
    </nav>

    {% block content %}
    {% endblock %}
</body>
</html>
