{% extends "catalog/base.html" %}

{% block content %}
<h2>{% if view.object %}Редактировать продукт{% else %}Создать продукт{% endif %}</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Сохранить</button>
</form>
<a href="{% url 'product_list' %}" class="btn btn-secondary mt-2">Отмена</a>
{% endblock %}
