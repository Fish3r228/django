{% extends "catalog/base.html" %}

{% block content %}
<h1>Все продукты</h1>
<a href="{% url 'product_create' %}" class="btn btn-success">Создать продукт</a>
<table class="table mt-3">
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Цена</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
        <tr>
            <td>{{ product.id }}</td>
            <td>
                <a href="{{ product.get_absolute_url }}">
                    {{ product.name }}
                </a>
            </td>
            <td>{{ product.price }}</td>
            <td>
                <a href="{% url 'product_update' product.pk %}" class="btn btn-primary btn-sm">Изменить</a>
                <a href="{% url 'product_delete' product.pk %}" class="btn btn-danger btn-sm">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
