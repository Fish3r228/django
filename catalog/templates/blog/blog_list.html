{% extends "base.html" %}

{% block content %}
  <h1>Блог — список постов</h1>
  <a href="{% url 'blog_create' %}">Создать новый пост</a>
  <ul>
    {% for post in posts %}
      <li>
        <a href="{% url 'blog_detail' post.pk %}">{{ post.title }}</a>
        ({{ post.created_at|date:"d.m.Y H:i" }})
      </li>
    {% empty %}
      <li>Постов пока нет.</li>
    {% endfor %}
  </ul>
{% endblock %}
