{% extends "base.html" %}

{% block content %}
  <h1>{% if form.instance.pk %}Редактирование поста{% else %}Создать новый пост{% endif %}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Сохранить</button>
    <a href="{% url 'blog_list' %}">Отмена</a>
  </form>
{% endblock %}
